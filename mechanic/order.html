<!DOCTYPE html>
<html lang="ru">

<head>
	<meta charset="utf-8">
	<title>Заказы</title>
	<meta name="description" content="">
	<meta content="telephone=no" name="format-detection">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

	<!-- Template Basic img Start -->
	<meta property="og:image" content="path/to/image.jpg">
	<link rel="icon" href="img/favicon/favicon.ico">
	<link rel="apple-touch-icon" sizes="180x180" href="img/favicon/apple-touch-icon-180x180.png">
	<link href="https://fonts.googleapis.com/css?family=Montserrat:700&display=swap" rel="stylesheet">
	<!-- Template Basic img End -->

	<!-- Custom Browsers Color Start -->
	<meta name="theme-color" content="#000">
	<!-- Custom Browsers Color End -->
	<link rel="stylesheet" href="./css/styles.min.css">
	<link rel="stylesheet" href="./css/main.css">
</head>
<body >
	<div class="carcas" style="background: url(./img/carcas@2x.png) no-repeat; background-size: contain;">
		<div class="app app--none" style="background: url(./img/bg01.png) no-repeat; background-size: cover;">
			<a href="#" class="app__back">Назад</a>
			<div class="btns btns--second">
				<a href="#" class="btns__item btn btn--red">Вызвать механика</a>
				<a href="#" class="btns__item btn btn--blue">
					Автосервис
					<img src="./img/location.svg" alt="location" width="18" height="24">
				</a>
			</div>
			<div class="center">
					<div class="order">
							<h1 class="order__title">
								Мои заказы
							</h1>
							<div class="order__item">
								<h3 class="order__item-id">
									ID заказа:  <span>№</span>3456
								</h3>	
								<span class="order__item-geo">
									<img src="./img/house.svg" alt="house" width="26" height="28">
									<span>Buenos Aires St. 45</span> 
								</span>
								<div class="order__item-status">
										Статус:
									<strong class="order__item-value">
											Ожидание запроса
									</strong>
								</div>
								<a href="#" class="btn btn--color--red btn--small">Отменить заказ</a>
							</div>
					</div>
			</div>
	
	
		</div>
	</div>




	<script src="./js/scripts.min.js"></script>
	<script src="./js/common.js"></script>
</body>
</html>

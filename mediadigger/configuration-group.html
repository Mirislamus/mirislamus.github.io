<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="stylesheet" href="css/style.bundle.css" />

    <title>Настройки</title>
  </head>

  <body>
    <div class="page-wrap">
      <header class="page-header">
        <div class="container">
          <div class="row">
            <div class="col-md-6">
              <form action="#">
                <div class="search" tabindex="0">
                  <button class="search__btn">
                    <span class="icon-search-2"></span>
                  </button>
                  <input class="search__input" type="search" placeholder="Поиск" />
                </div>
              </form>
            </div>
            <div class="col-md-6">
              <div class="page-header__right">
                <a href="#" class="btn-up page-header__btn">
                  <span class="btn-up__icon icon-star"></span>
                  Upgrade account
                </a>

                <button type="button" class="btn btn--grey page-header__pp">
                  PP
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>
      <aside class="page-aside">
        <a href="/" class="page-aside__logo">
          <img src="./img/logo.svg" alt="logo" />
        </a>
        <nav class="navigation">
          <ul class="navigation__list">
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-contacts"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-message"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-statistics"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-configurations active"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-permissions"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-history"> </span>
              </a>
            </li>
          </ul>
          <ul class="navigation__list navigation__list--second">
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-user"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-support"> </span>
              </a>
            </li>
          </ul>
        </nav>
        <button type="button" class="btn-icon btn-icon--arr btn-icon__aside">
          <span class="icon-arrow"></span>
        </button>
      </aside>

      <main class="page-main">
        <div class="container">
          <div class="row">
            <div class="col-md-12 content__top">
              <h1 class="content__title">Настройки</h1>
            </div>
            <div class="col-sm-7 col-md-6 content__center">
              <div class="tabs">
                <a href="#" class="tabs__item active">Группы</a>
                <a href="#" class="tabs__item">Тэги</a>
                <a href="#" class="tabs__item">Организация</a>
              </div>
            </div>
            <div class="col-sm-5 col-md-6 content__center content__center--end content__configuration">
              <div class="popup-add-group popup-add-group--left open">
                <button type="button" class="btn btn--add">
                  <span class="icon icon--plus"></span>
                  Добавить группу
                </button>
                <div class="popup-add-group__window">
                  <div class="popup-add-group__top">
                    <strong class="popup-add-group__name">
                      Создать группу
                    </strong>
                  </div>
                  <label class="modal__label ">
                    Введите название группы
                    <div class="popup-add-group__value popup-add-group__search">
                      <input type="text" class="modal__input" placeholder="Значение" />
                      <span class="popup-add-group__val">
                        <span class="value">0</span>/<span class="value">30</span>
                      </span>
                    </div>
                  </label>
                  <label class="modal__label ">
                    Добавьте контакты
                    <div class="search-stage__wrapper">
                      <span class="icon-search"></span>
                      <input type="search" class="search-stage__input" />
                    </div>
                  </label>

                  <div class="search-stage__column search-stage__column--border">
                    <label class="search-stage__label">
                      <input type="checkbox" class="search-stage__checkbox" />
                      <span class="search-stage__name">
                        Артисты
                      </span>
                    </label>
                    <label class="search-stage__label">
                      <input type="checkbox" class="search-stage__checkbox" />
                      <span class="search-stage__name">
                        Блогерры
                      </span>
                    </label>
                    <label class="search-stage__label">
                      <input type="checkbox" class="search-stage__checkbox" />
                      <span class="search-stage__name">
                        Варисты
                      </span>
                    </label>
                    <label class="search-stage__label">
                      <input type="checkbox" class="search-stage__checkbox" />
                      <span class="search-stage__name">
                        Гимнасты
                      </span>
                    </label>
                    <label class="search-stage__label">
                      <input type="checkbox" class="search-stage__checkbox" />
                      <span class="search-stage__name">
                        Дипломаты
                      </span>
                    </label>
                    <label class="search-stage__label">
                      <input type="checkbox" class="search-stage__checkbox" />
                      <span class="search-stage__name">
                        Еретики
                      </span>
                    </label>
                    <div class="scroll-search"></div>
                  </div>
                  <button type="button" class="tag popup-tag">
                    <span class="tag__text">
                      Выбрано: 6
                    </span>
                    <span class="icon-cross-bold tag__close"></span>
                  </button>
                  <div class="tac">
                    <button type="button" class="next selected-btn modal__save">Сохранить</button>
                  </div>
                </div>
              </div>
            </div>
            <div class="col-md-12">
              <div class="table-settings">
                <div class="table-settings__row">
                  <div class="table-settings__column">
                    <div class="table-settings__title">
                      Группа
                      <span class="icon-sort-down"></span>
                    </div>
                  </div>
                  <div class="table-settings__column">
                    <div class="table-settings__title">
                      К-во контактов
                      <span class="icon-sort-down"></span>
                    </div>
                  </div>
                  <div class="table-settings__column">
                    <div class="table-settings__title">
                      К-во коллег
                      <span class="icon-sort-down"></span>
                    </div>
                  </div>
                </div>
                <div class="table-settings__row table-settings__row--category">
                  <div class="table-settings__column">
                    <div class="table-settings__title table-settings__title--1">
                      Deependra Bardhan
                    </div>
                  </div>
                  <div class="table-settings__column">
                    <div class="table-settings__title table-settings__title--2">
                      19 контактов
                    </div>
                  </div>
                  <div class="table-settings__column">
                    <div class="table-settings__title table-settings__title--2">
                      3 коллег
                    </div>
                    <div class="table-settings__btns">
                      <button type="button" class="table-settings__btn">
                        <span class="icon-edit-void"></span>
                      </button>
                      <button type="button" class="table-settings__btn">
                        <span class="icon-duplicate"></span>
                      </button>
                      <button type="button" class="table-settings__btn">
                        <span class="icon-delete"></span>
                      </button>
                    </div>
                  </div>
                </div>
                <div class="table-settings__row table-settings__row--category">
                  <div class="table-settings__column">
                    <div class="table-settings__title table-settings__title--1">
                      Evelyn Allen
                    </div>
                  </div>
                  <div class="table-settings__column">
                    <div class="table-settings__title table-settings__title--2">
                      19 контактов
                    </div>
                  </div>
                  <div class="table-settings__column">
                    <div class="table-settings__title table-settings__title--2">
                      3 коллег
                    </div>
                    <div class="table-settings__btns">
                      <button type="button" class="table-settings__btn">
                        <span class="icon-edit-void"></span>
                      </button>
                      <button type="button" class="table-settings__btn">
                        <span class="icon-duplicate"></span>
                      </button>
                      <button type="button" class="table-settings__btn">
                        <span class="icon-delete"></span>
                      </button>
                    </div>
                  </div>
                </div>
                <div class="table-settings__row table-settings__row--category">
                  <div class="table-settings__column">
                    <div class="table-settings__title table-settings__title--1">
                      Dameon Peterson
                    </div>
                  </div>
                  <div class="table-settings__column">
                    <div class="table-settings__title table-settings__title--2">
                      19 контактов
                    </div>
                  </div>
                  <div class="table-settings__column">
                    <div class="table-settings__title table-settings__title--2">
                      3 коллег
                    </div>
                    <div class="table-settings__btns">
                      <button type="button" class="table-settings__btn">
                        <span class="icon-edit-void"></span>
                      </button>
                      <button type="button" class="table-settings__btn">
                        <span class="icon-duplicate"></span>
                      </button>
                      <button type="button" class="table-settings__btn">
                        <span class="icon-delete"></span>
                      </button>
                    </div>
                  </div>
                </div>
                <div class="table-settings__row table-settings__row--category">
                  <div class="table-settings__column">
                    <div class="table-settings__title table-settings__title--1">
                      Bansilal Brata
                    </div>
                  </div>
                  <div class="table-settings__column">
                    <div class="table-settings__title table-settings__title--2">
                      19 контактов
                    </div>
                  </div>
                  <div class="table-settings__column">
                    <div class="table-settings__title table-settings__title--2">
                      3 коллег
                    </div>
                    <div class="table-settings__btns">
                      <button type="button" class="table-settings__btn">
                        <span class="icon-edit-void"></span>
                      </button>
                      <button type="button" class="table-settings__btn">
                        <span class="icon-duplicate"></span>
                      </button>
                      <button type="button" class="table-settings__btn">
                        <span class="icon-delete"></span>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <div class="scroll"></div>
    <script src="js/bundle.js"></script>
  </body>
</html>

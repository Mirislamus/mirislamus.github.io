<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="stylesheet" href="css/style.bundle.css" />

    <title>Рассылка</title>
  </head>

  <body>
    <div class="page-wrap">
      <header class="page-header">
        <div class="container">
          <div class="row">
            <div class="col-md-6">
              <form action="#">
                <div class="search" tabindex="0">
                  <button class="search__btn">
                    <span class="icon-search-2"></span>
                  </button>
                  <input class="search__input" type="search" placeholder="Поиск" />
                </div>
              </form>
            </div>
            <div class="col-md-6">
              <div class="page-header__right">
                <a href="#" class="btn-up page-header__btn">
                  <span class="btn-up__icon icon-star"></span>
                  Upgrade account
                </a>

                <button type="button" class="btn btn--grey page-header__pp">
                  PP
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>
      <aside class="page-aside">
        <a href="/" class="page-aside__logo">
          <img src="./img/logo.svg" alt="logo" />
        </a>
        <nav class="navigation">
          <ul class="navigation__list">
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-contacts"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link active">
                <span class="icon-message"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-statistics"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-configurations"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-permissions"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-history"> </span>
              </a>
            </li>
          </ul>
          <ul class="navigation__list navigation__list--second">
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-user"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-support"> </span>
              </a>
            </li>
          </ul>
        </nav>
        <button type="button" class="btn-icon btn-icon--arr btn-icon__aside">
          <span class="icon-arrow"></span>
        </button>
      </aside>

      <main class="page-main">
        <div class="container">
          <div class="row">
            <div class="col-md-12 content__top">
              <h1 class="content__title">Рассылка</h1>
            </div>
            <div class="col-md-5">
              <a href="#" class="mailing ">
                <div class="mailing__icon">
                  <img src="./img/icons/plain.svg" alt="plain" />
                </div>
                <h5 class="mailing__title">
                  Обычная
                </h5>
                <p class="mailing__text">
                  Пояснительный текст какой-нибудь. Сам придумай.
                </p>
              </a>
            </div>
            <div class="col-md-5">
              <a href="#" class="mailing ">
                <div class="mailing__icon">
                  <img src="./img/icons/complex.svg" alt="complex" />
                </div>
                <h5 class="mailing__title">
                  Продвинутая
                </h5>
                <p class="mailing__text">
                  Пояснительный текст какой-нибудь. Сам придумай.
                </p>
              </a>
            </div>
          </div>
          <div class="row">
            <div class="col-md-3">
              <a href="#" class="mailing mailing--mini">
                <span class="icon-planned"></span>
                <h5 class="mailing__title">
                  Обычная
                </h5>
                <p class="mailing__text">
                  Пояснительный текст какой-нибудь
                </p>
              </a>
            </div>
            <div class="col-md-3">
              <a href="#" class="mailing mailing--mini">
                <span class="icon-statistics"></span>

                <h5 class="mailing__title">
                  Обычная
                </h5>
                <p class="mailing__text">
                  Пояснительный текст какой-нибудь
                </p>
              </a>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="js/bundle.js"></script>
  </body>
</html>

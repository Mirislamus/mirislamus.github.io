<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="stylesheet" href="css/style.bundle.css" />

    <title>Рассылка 1</title>
  </head>

  <body>
    <div class="page-wrap">
      <header class="page-header">
        <div class="container">
          <div class="row">
            <div class="col-md-6">
              <form action="#">
                <div class="search" tabindex="0">
                  <button class="search__btn">
                    <span class="icon-search-2"></span>
                  </button>
                  <input class="search__input" type="search" placeholder="Поиск" />
                </div>
              </form>
            </div>
            <div class="col-md-6">
              <div class="page-header__right">
                <a href="#" class="btn-up page-header__btn">
                  <span class="btn-up__icon icon-star"></span>
                  Upgrade account
                </a>

                <button type="button" class="btn btn--grey page-header__pp">
                  PP
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>
      <aside class="page-aside">
        <a href="/" class="page-aside__logo">
          <img src="./img/logo.svg" alt="logo" />
        </a>
        <nav class="navigation">
          <ul class="navigation__list">
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-contacts"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link active">
                <span class="icon-message"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-statistics"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-configurations"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-permissions"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-history"> </span>
              </a>
            </li>
          </ul>
          <ul class="navigation__list navigation__list--second">
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-user"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-support"> </span>
              </a>
            </li>
          </ul>
        </nav>
        <button type="button" class="btn-icon btn-icon--arr btn-icon__aside">
          <span class="icon-arrow"></span>
        </button>
      </aside>

      <main class="page-main">
        <div class="container">
          <div class="row">
            <div class="col-md-12 stage">
              <button type="button" class="btn-icon btn-icon--arr back">
                <span class="icon-arrow"></span>
              </button>
              <h2 class="stage__title">
                1 /4
              </h2>
            </div>
            <div class="col-md-12">
              <h1 class="message-title">
                Созать сообщение
              </h1>
            </div>
            <div class="col-md-12">
              <form action="#" class="form">
                <div class="form__group">
                  <label for="text" class="form__label">Тема письма</label>
                  <input type="text" class="form__input" id="text" placeholder="Введите тему письма" />
                </div>
                <div class="form__group">
                  <label for="message" class="form__label">Сообщение</label>
                  <div class="form__row">
                    <button type="button" class="btn btn--arrow form__btn">
                      Размер
                      <div class="btn__arrow">
                        <span class="icon-arrow-down"></span>
                      </div>
                    </button>
                    <button type="button" class="btn btn--arrow form__btn">
                      Цвет
                      <div class="btn__arrow">
                        <span class="icon-arrow-down"></span>
                      </div>
                    </button>
                    <button type="button" class="btn btn__form ">
                      <span class="icon-text-bold"></span>
                    </button>
                    <button type="button" class="btn btn__form">
                      <span class="icon-text-italic"></span>
                    </button>
                    <button type="button" class="btn btn__form">
                      <span class="icon-text-underline"></span>
                    </button>
                    <button type="button" class="btn btn__form">
                      <span class="icon-text-link"></span>
                    </button>
                    <button type="button" class="btn btn__form">
                      <span class="icon-text-align-left"></span>
                    </button>
                    <button type="button" class="btn btn__form">
                      <span class="icon-rows"></span>
                    </button>
                    <button type="button" class="btn btn__form">
                      <span class="icon-text-right"></span>
                    </button>
                    <button type="button" class="btn btn__form">
                      <span class="icon-text-numbered-list"></span>
                    </button>
                    <button type="button" class="btn btn--text btn__form">
                      Добавить имя
                    </button>
                    <button type="button" class="btn btn__form btn--preview">
                      <span class="icon-preview"></span>
                    </button>
                  </div>
                  <textarea class="form__input" id="message" placeholder="Введите текст сообщения"></textarea>
                </div>
                <div class="form__bottom">
                  <a href="#" class="btn-up page-header__btn btn-up--purple">
                    <span class="btn-up__icon icon-text-link-1"></span>
                    Прикрепить файл
                  </a>
                  <a href="#" class="next">Далее</a>
                </div>
              </form>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="js/bundle.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="stylesheet" href="css/style.bundle.css" />

    <title>Рассылка 4</title>
  </head>

  <body>
    <div class="page-wrap">
      <header class="page-header">
        <div class="container">
          <div class="row">
            <div class="col-md-6">
              <form action="#">
                <div class="search" tabindex="0">
                  <button class="search__btn">
                    <span class="icon-search-2"></span>
                  </button>
                  <input class="search__input" type="search" placeholder="Поиск" />
                </div>
              </form>
            </div>
            <div class="col-md-6">
              <div class="page-header__right">
                <a href="#" class="btn-up page-header__btn">
                  <span class="btn-up__icon icon-star"></span>
                  Upgrade account
                </a>

                <button type="button" class="btn btn--grey page-header__pp">
                  PP
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>
      <aside class="page-aside">
        <a href="/" class="page-aside__logo">
          <img src="./img/logo.svg" alt="logo" />
        </a>
        <nav class="navigation">
          <ul class="navigation__list">
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-contacts"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link active">
                <span class="icon-message"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-statistics"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-configurations"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-permissions"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-history"> </span>
              </a>
            </li>
          </ul>
          <ul class="navigation__list navigation__list--second">
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-user"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-support"> </span>
              </a>
            </li>
          </ul>
        </nav>
        <button type="button" class="btn-icon btn-icon--arr btn-icon__aside">
          <span class="icon-arrow"></span>
        </button>
      </aside>

      <main class="page-main">
        <div class="container">
          <div class="row">
            <div class="col-md-12 stage">
              <button type="button" class="btn-icon btn-icon--arr back">
                <span class="icon-arrow"></span>
              </button>
              <h2 class="stage__title">
                3 /4
              </h2>
            </div>
            <div class="col-md-12">
              <h1 class="message-title">
                Выбор журналистов
              </h1>
              <p class="message-text">
                Выберите один или несколько списков. Вы также можете добавить вручную журналистов, сохраненных в
                закладках
              </p>
            </div>
            <div class="col-md-6">
              <div class="tabs tabs--dot">
                <a href="#" class="tabs__item dot active">Группы</a>
                <a href="#" class="tabs__item">Закладки</a>
              </div>
            </div>
            <div class="col-md-6 stage__select">
              <button type="button" class="select-all">Выделить все</button>
            </div>
            <div class="col-md-12">
              <form action="#">
                <div class="search-stage">
                  <div class="search-stage__wrapper">
                    <span class="icon-search-2"></span>
                    <input type="search" class="search-stage__input" />
                  </div>
                  <div class="search-stage__column">
                    <label class="search-stage__label">
                      <input type="checkbox" class="search-stage__checkbox" />
                      <span class="search-stage__name">
                        Артисты
                      </span>
                    </label>
                    <label class="search-stage__label">
                      <input type="checkbox" class="search-stage__checkbox" />
                      <span class="search-stage__name">
                        Блогерры
                      </span>
                    </label>
                    <label class="search-stage__label">
                      <input type="checkbox" class="search-stage__checkbox" />
                      <span class="search-stage__name">
                        Варисты
                      </span>
                    </label>
                    <label class="search-stage__label">
                      <input type="checkbox" class="search-stage__checkbox" />
                      <span class="search-stage__name">
                        Гимнасты
                      </span>
                    </label>
                    <label class="search-stage__label">
                      <input type="checkbox" class="search-stage__checkbox" />
                      <span class="search-stage__name">
                        Дипломаты
                      </span>
                    </label>
                    <label class="search-stage__label">
                      <input type="checkbox" class="search-stage__checkbox" />
                      <span class="search-stage__name">
                        Еретики
                      </span>
                    </label>
                  </div>
                  <div class="scroll-search"></div>
                </div>
              </form>
              <div class="selected">
                <span class="selected__title">Выбранно:</span>
                <button type="button" class="tag tag--purple selected__tag">
                  <span class="tag__text">
                    Блоггеры
                  </span>
                  <span class="icon-cross-thin tag__close tag__close--purple"></span>
                </button>
                <button type="button" class="tag tag--purple selected__tag">
                  <span class="tag__text">
                    Дипломаты
                  </span>
                  <span class="icon-cross-thin tag__close tag__close--purple"></span>
                </button>
                <button type="button" class="selected__delete">
                  <span class="icon-cross-bold tag__close"></span>
                </button>
              </div>
              <div class="tar">
                <a href="#" class="next selected-btn">Далее</a>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="js/bundle.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="stylesheet" href="css/style.bundle.css" />

    <title>Рассылка 6</title>
  </head>

  <body>
    <div class="page-wrap">
      <header class="page-header">
        <div class="container">
          <div class="row">
            <div class="col-md-6">
              <form action="#">
                <div class="search" tabindex="0">
                  <button class="search__btn">
                    <span class="icon-search-2"></span>
                  </button>
                  <input class="search__input" type="search" placeholder="Поиск" />
                </div>
              </form>
            </div>
            <div class="col-md-6">
              <div class="page-header__right">
                <a href="#" class="btn-up page-header__btn">
                  <span class="btn-up__icon icon-star"></span>
                  Upgrade account
                </a>

                <button type="button" class="btn btn--grey page-header__pp">
                  PP
                </button>
              </div>
            </div>
          </div>
        </div>
      </header>
      <aside class="page-aside">
        <a href="/" class="page-aside__logo">
          <img src="./img/logo.svg" alt="logo" />
        </a>
        <nav class="navigation">
          <ul class="navigation__list">
            <li class="navigation__item">
              <a href="#" class="navigation__link active">
                <span class="icon-contacts"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-message"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-statistics"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-configurations"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link ">
                <span class="icon-permissions"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-history"> </span>
              </a>
            </li>
          </ul>
          <ul class="navigation__list navigation__list--second">
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-user"> </span>
              </a>
            </li>
            <li class="navigation__item">
              <a href="#" class="navigation__link">
                <span class="icon-support"> </span>
              </a>
            </li>
          </ul>
        </nav>
        <button type="button" class="btn-icon btn-icon--arr btn-icon__aside">
          <span class="icon-arrow icon-arrow--modify"></span>
        </button>
      </aside>

      <main class="page-main">
        <div class="container">
          <div class="row">
            <div class="col-md-12 stage stage__ready">
              <button type="button" class="btn-icon btn-icon--arr back">
                <span class="icon-arrow"></span>
              </button>
              <h2 class="stage__title">
                4 /4
              </h2>
            </div>
            <div class="col-md-12">
              <h1 class="message-title">
                Все готово!
              </h1>
              <p class="message-text message-text--500">
                Задайте время отправки сообщений. После нажатия на кнопку, письмо будет отправлено 2 получателям
              </p>
            </div>
          </div>
          <div class="ready-mailing-container">
            <div class="ready-mailing">
              <div class="ready-mailing__item">
                <div class="ready-mailing__top">
                  <h5 class="ready-mailing__title">
                    Основное
                  </h5>
                  <div class="ready-mailing__btns">
                    <button type="button" class="btn-icon btn-icon--arr">
                      <span class="icon-edit-void"></span>
                    </button>
                    <button type="button" class="btn-icon btn-icon--arr">
                      <span class="icon-preview"></span>
                    </button>
                  </div>
                </div>
                <div class="ready-mailing__row">
                  <div class="ready-mailing__data">04.05.2019 <span class="icon-calendar"></span></div>
                  <div class="ready-mailing__data">09:58 <span class="icon-time"></span></div>
                </div>
              </div>
              <div class="ready-mailing__item">
                <div class="ready-mailing__top">
                  <h5 class="ready-mailing__title">
                    Повторное
                  </h5>
                  <div class="ready-mailing__btns">
                    <button type="button" class="btn-icon btn-icon--arr">
                      <span class="icon-edit-void"></span>
                    </button>
                    <button type="button" class="btn-icon btn-icon--arr">
                      <span class="icon-preview"></span>
                    </button>
                  </div>
                </div>
                <div class="ready-mailing__row">
                  <div class="ready-mailing__data">04.05.2019 <span class="icon-calendar"></span></div>
                  <div class="ready-mailing__data">09:58 <span class="icon-time"></span></div>
                </div>
              </div>
            </div>
            <label class="search-stage__label ready-mailing__label">
              <input type="checkbox" class="search-stage__checkbox ready-mailing__checkbox" />
              <span class="search-stage__name">
                Отправить прямо сейчас
              </span>
            </label>
            <div class="tar">
              <a href="#" class="next">Отправить</a>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="js/bundle.js"></script>
  </body>
</html>

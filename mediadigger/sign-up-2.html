<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <link rel="shortcut icon" href="favicon/favicon.ico" />
    <link rel="stylesheet" href="css/style.bundle.css" />

    <title>Команда</title>
  </head>

  <body class="sign-bg">
    <div class="page-wrap sign-up">
      <header class="sign-up__header">
        <div class="container">
          <div class="row sign-up__row">
            <div class="col-6">
              <a href="#" class="sign-up__logo">
                <img src="img/logo.svg" alt="logo" />
                MediaDigger
              </a>
            </div>
            <div class="col-6 d-flex justify-content-end">
              <button type="button" class="sign-up__btn">
                Вход
              </button>
            </div>
          </div>
        </div>
      </header>
      <div class="sign-up__forms ">
        <div class="container d-flex justify-content-end">
          <form action="#">
            <div class="sign-up__form">
              <h1 class="sign-up__form-title">
                Регистрация
              </h1>
              <input type="text" class="sign-up__input" placeholder="Имя" />
              <input type="text" class="sign-up__input" placeholder="Фамилия" />
              <input type="email" class="sign-up__input" placeholder="Почта" />
              <button class="btn-sign">
                Зарегистрироваться
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="js/bundle.js"></script>
  </body>
</html>

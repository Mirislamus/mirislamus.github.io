<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accordion</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="accordion">
    <button type="button" class="accordion-item accordionItem" aria-selected="false" data-target="#accordion1" aria-controls="accordion1">
      Accordion 1
    </button>
    <div class="accordion-content accordionContent" aria-selected="false" id="accordion1" aria-labelledby="accordion1">
      Accordion Content 1
    </div>
    <button type="button" class="accordion-item accordionItem" aria-selected="false" data-target="#accordion2" aria-controls="accordion2">
      Accordion 2
    </button>
    <div class="accordion-content accordionContent" aria-selected="false" id="accordion2" aria-labelledby="accordion2">
      Accordion Content 2
    </div>
    <button type="button" class="accordion-item accordionItem" aria-selected="false" data-target="#accordion3" aria-controls="accordion3">
      Accordion 3
    </button>
    <div class="accordion-content accordionContent" aria-selected="false" id="accordion3" aria-labelledby="accordion3">
      Accordion Content 3
    </div>

    <button type="button" class="accordion-item accordionItem" aria-selected="false" data-target="#accordion1-2" aria-controls="accordion1-2">
      Accordion 1
    </button>
    <div class="accordion-content accordionContent" aria-selected="false" id="accordion1-2" aria-labelledby="accordion1-2">
      Accordion Content 1
    </div>
    <button type="button" class="accordion-item accordionItem" aria-selected="false" data-target="#accordion2-2" aria-controls="accordion2-2">
      Accordion 2
    </button>
    <div class="accordion-content accordionContent" aria-selected="false" id="accordion2-2" aria-labelledby="accordion2">
      Accordion Content 2
    </div>
    <button type="button" class="accordion-item accordionItem" aria-selected="false" data-target="#accordion3-2" aria-controls="accordion3-2">
      Accordion 3
    </button>
    <div class="accordion-content accordionContent" aria-selected="false" id="accordion3" aria-labelledby="accordion3">
      Accordion Content 3
    </div>
  </div>
  <script src="./js/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="tabs">
    <div class="tabs__buttons" role="tablist">
      <button type="button" class="tab-item tabItem active" role="tab" aria-selected="true" data-target="#tab1" aria-controls="tab1">
        Tab 1
      </button>
      <button type="button" class="tab-item tabItem" role="tab" aria-selected="false" data-target="#tab2" aria-controls="tab2">
        Tab 2
      </button>
      <button type="button" class="tab-item tabItem" role="tab" aria-selected="false" data-target="#tab3" aria-controls="tab3">
        Tab 3
      </button>
    </div>
    <div class="tabs__content">
      <div class="tab-content tabContent active" role="tabpanel" aria-selected="true" id="tab1" aria-labelledby="tab1">
        Content 1
      </div>
      <div class="tab-content tabContent" role="tabpanel" aria-selected="false" id="tab2" aria-labelledby="tab2">
        Content 2
      </div>
      <div class="tab-content tabContent" role="tabpanel" aria-selected="false" id="tab3" aria-labelledby="tab3">
        Content 3
      </div>
    </div>
  </div>
  <br>
  <div class="accordion">
    <button type="button" class="accordion-item accordionItem active" aria-selected="true" data-target="#tab1" aria-controls="accordion1">
      accordion 1
    </button>
    <div class="accordion-content accordionContent active" aria-selected="true" id="accordion1" aria-labelledby="accordion1">
      Content 1
    </div>
    <button type="button" class="accordion-item accordionItem" aria-selected="false" data-target="#accordion2" aria-controls="accordion2">
      accordion 2
    </button>
    <div class="accordion-content accordionContent" aria-selected="false" id="accordion2" aria-labelledby="accordion2">
      Content 2
    </div>
    <button type="button" class="accordion-item accordionItem" aria-selected="false" data-target="#accordion3" aria-controls="accordion3">
      accordion 3
    </button>
    <div class="accordion-content accordionContent" aria-selected="false" id="accordion3" aria-labelledby="accordion3">
      Content 3
    </div>
  </div>
  <script src="./js/script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs</title>
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div class="data-filters">
    <div class="data-filters__btns">
      <!-- <button type="button" class="data-btn dataBtn active" data-filter="all">
        All
      </button> -->
      <button type="button" class="data-btn dataBtn active" data-filter="cars">
        Cars
      </button>
      <button type="button" class="data-btn dataBtn" data-filter="fruits">
        Fruits
      </button>
    </div>
    <div class="data-filter__content">
      <div class="data-item dateItem" data-filter-item="cars">
        Jentra
      </div>
      <div class="data-item dateItem" data-filter-item="fruits">
        Apple
      </div>
      <div class="data-item dateItem" data-filter-item="cars">
        Mazda
      </div>
      <div class="data-item dateItem" data-filter-item="fruits">
        Orange
      </div>
    </div>
  </div>

  <script src="./js/script.js"></script>
</body>
</html>

<body class="page__body">
  <header class="page-header">
    <div class="page-header__container container">
      <a href="/" class="logo">
        <picture>
          <source srcset="./img/logo-mobile.png 1x, ./img/logo-mobile@2x.png 2x" media="(max-width: 575px)">
          <img src="./img/logo.png" srcset="./img/logo.png 1x, ./img/logo@2x.png 2x" alt="logo">
        </picture>
      </a>
    </div>
  </header>

  <main class="page-main">

    <section class="bizdevim">
      <div class="bizdevim__container container">
        <div class="bizdevim__top">
          <ul class="bizdevim__list list-reset">
            <li>Skype</li>
            <li>WhatsApp</li>
            <li>LinkedIn</li>
          </ul>
          <ul class="bizdevim__list list-reset">
            <li>Zoom</li>
            <li>Slack</li>
            <li>Bizdevim</li>
          </ul>
        </div>
        <h1 class="bizdevim__title">
          Bizdevim - network <br class="br-m"> for business
        </h1>
        <strong class="bizdevim__subtitle">
          Join future of networking
        </strong>
        <form action="#" class="form">
          <div class="form__box">
            <input class="input-reset form__input" type="email" placeholder="Enter your Email" required>
            <button class="btn-reset form__btn" type="submit">Join the waitlist</button>
          </div>
        </form>
        <b class="bizdevim__suptitle">
          No more chaos
        </b>
        <p class="bizdevim__text">
          Ask friends for invite to get in
        </p>
      </div>
    </section>

  </main>
  <footer class="page-footer">
    <div class="container">
      <div class="links">
        <a href="bizdevim.com" class="links__item link-reset">bizdevim.com</a>
        <a href="bizdev.im" class="links__item link-reset">bizdev.im</a>
        <a href="bdev.im" class="links__item link-reset">bdev.im</a>
      </div>
